<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#B8975A;--gold-light:#D4B57E;--gold-dark:#8A6E3E;
  --black:#0A0A0A;--dark:#111111;--dark-2:#161616;--dark-3:#1E1E1E;
  --text:#E8E4DC;--text-muted:#8A8680;--text-subtle:#5A5652;
  --border:rgba(184,151,90,0.15);--border-hover:rgba(184,151,90,0.35);
  --win:#4A9E6A;--loss:#C05A5A;
}
html,body{background:var(--dark);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh}

.hdr{background:var(--black);border-bottom:1px solid var(--border);padding:20px 32px;display:flex;justify-content:space-between;align-items:center}
.hdr-logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:500;letter-spacing:.15em;color:var(--text)}
.hdr-logo span{color:var(--gold)}
.hdr-tag{font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:var(--text-subtle);margin-top:3px}
.hdr-right{display:flex;gap:12px;align-items:center}
.live-pill{display:flex;align-items:center;gap:6px;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--text-subtle);border:1px solid var(--border);padding:6px 14px}
.live-dot{width:6px;height:6px;border-radius:50%;background:#4A9E6A;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.btn-add{background:var(--gold);color:var(--black);font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;border:none;padding:10px 22px;cursor:pointer;transition:background .2s}
.btn-add:hover{background:var(--gold-light)}

.price-ticker{background:var(--black);border-bottom:1px solid var(--border);padding:8px 32px;display:flex;gap:28px;overflow-x:auto;scrollbar-width:none}
.price-ticker::-webkit-scrollbar{display:none}
.ticker-item{display:flex;align-items:center;gap:8px;flex-shrink:0}
.ticker-sym{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-subtle)}
.ticker-price{font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--text);transition:color .3s}
.ticker-chg{font-size:9px}
.ticker-price.flash-up{color:#6BBF8A}
.ticker-price.flash-dn{color:#D97070}

.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--dark-2);padding:0 32px}
.tab{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-subtle);padding:14px 20px;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab:hover{color:var(--text-muted)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}

.main{padding:32px;max-width:1400px;margin:0 auto}

.stat-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:28px}
.stat-card{background:var(--dark-3);border:1px solid var(--border);padding:20px 20px 16px;position:relative;overflow:hidden;transition:border-color .3s}
.stat-card:hover{border-color:var(--border-hover)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:var(--gold);opacity:0;transition:opacity .3s}
.stat-card:hover::before{opacity:.5}
.stat-label{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--text-subtle);margin-bottom:10px}
.stat-val{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;line-height:1;color:var(--text)}
.stat-val.pos{color:#6BBF8A}
.stat-val.neg{color:#D97070}
.stat-sub{font-size:10px;color:var(--text-subtle);margin-top:6px}

.sec-label{font-size:9px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);margin-bottom:16px;display:flex;align-items:center;gap:10px}
.sec-label::before{content:'';display:block;width:20px;height:1px;background:var(--gold);opacity:.6}

.tbl-wrap{background:var(--dark-3);border:1px solid var(--border);overflow:hidden;margin-bottom:28px}
.tbl-head{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;border-bottom:1px solid var(--border)}
.tbl-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:400;color:var(--text)}
.tbl-filter{display:flex;gap:8px}
.filter-btn{font-size:9px;letter-spacing:.15em;text-transform:uppercase;background:transparent;border:1px solid var(--border);color:var(--text-subtle);padding:5px 12px;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.filter-btn.active,.filter-btn:hover{border-color:var(--gold);color:var(--gold)}
table{width:100%;border-collapse:collapse}
th{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-subtle);padding:12px 20px;text-align:left;border-bottom:1px solid var(--border);font-weight:400}
th:last-child{text-align:right}
td{font-size:12px;color:var(--text-muted);padding:14px 20px;border-bottom:1px solid rgba(184,151,90,0.07);transition:background .2s;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(184,151,90,0.04)}
.td-sym{font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--text);font-weight:400;letter-spacing:.05em}
.badge{display:inline-block;font-size:8px;letter-spacing:.15em;text-transform:uppercase;padding:3px 9px;font-weight:500}
.badge.long{background:rgba(74,158,106,0.15);color:#6BBF8A;border:1px solid rgba(74,158,106,0.3)}
.badge.short{background:rgba(192,90,90,0.15);color:#D97070;border:1px solid rgba(192,90,90,0.3)}
.badge.open{background:rgba(184,151,90,0.12);color:var(--gold);border:1px solid var(--border)}
.badge.tp-hit{background:rgba(74,158,106,0.2);color:#6BBF8A;border:1px solid rgba(74,158,106,0.4)}
.badge.sl-hit{background:rgba(192,90,90,0.2);color:#D97070;border:1px solid rgba(192,90,90,0.4)}
.badge.limit{background:rgba(184,151,90,0.08);color:var(--gold-dark);border:1px solid rgba(184,151,90,0.2)}
.pnl-pos{color:#6BBF8A;font-weight:400}
.pnl-neg{color:#D97070;font-weight:400}
.pnl-neutral{color:var(--text-muted)}
td:last-child{text-align:right}
.row-action{display:flex;gap:6px;justify-content:flex-end}
.act-btn{background:transparent;border:1px solid var(--border);color:var(--text-subtle);font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.act-btn:hover{border-color:var(--border-hover);color:var(--text)}
.act-btn.del:hover{border-color:rgba(192,90,90,0.4);color:#D97070}

.bottom-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.chart-box{background:var(--dark-3);border:1px solid var(--border);padding:24px}
.chart-lbl{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-subtle);margin-bottom:20px}
.equity-chart{width:100%;height:140px}
.breakdown-box{background:var(--dark-3);border:1px solid var(--border);padding:24px}
.bk-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.bk-row:last-child{border-bottom:none}
.bk-sym{font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--text)}
.bk-bar-wrap{flex:1;margin:0 16px;height:4px;background:rgba(184,151,90,0.1)}
.bk-bar{height:100%}
.bk-val{font-size:11px;min-width:56px;text-align:right}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--dark-2);border:1px solid var(--border);padding:0;width:500px;max-height:85vh;overflow-y:auto;position:relative}
.modal-hdr{padding:24px 28px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;color:var(--text)}
.modal-close{background:transparent;border:none;color:var(--text-subtle);font-size:18px;cursor:pointer;padding:4px 8px;transition:color .2s}
.modal-close:hover{color:var(--text)}
.modal-body{padding:24px 28px}
.form-group{margin-bottom:16px}
.form-label{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-subtle);display:block;margin-bottom:7px}
.form-input{width:100%;background:var(--dark-3);border:1px solid var(--border);color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:300;padding:11px 14px;outline:none;transition:border-color .2s;appearance:none}
.form-input::placeholder{color:var(--text-subtle)}
.form-input:focus{border-color:var(--gold)}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-footer{padding:16px 28px 24px;display:flex;gap:10px;justify-content:flex-end}
.btn-cancel{background:transparent;border:1px solid var(--border);color:var(--text-muted);font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:.15em;text-transform:uppercase;padding:10px 20px;cursor:pointer;transition:all .2s}
.btn-cancel:hover{border-color:var(--border-hover);color:var(--text)}
.btn-save{background:var(--gold);color:var(--black);font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;border:none;padding:10px 28px;cursor:pointer;transition:background .2s}
.btn-save:hover{background:var(--gold-light)}

.notes-section{margin-bottom:28px}
.notes-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.note-card{background:var(--dark-3);border:1px solid var(--border);padding:18px;transition:border-color .3s}
.note-card:hover{border-color:var(--border-hover)}
.note-sym{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--text);margin-bottom:6px}
.note-date{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-subtle);margin-bottom:10px}
.note-txt{font-size:12px;color:var(--text-muted);line-height:1.7}
.note-tag{font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-top:10px;opacity:.7}

.empty{text-align:center;padding:48px 24px;color:var(--text-subtle);font-size:12px;letter-spacing:.1em}
.empty-icon{font-family:'Cormorant Garamond',serif;font-size:40px;opacity:.2;margin-bottom:12px;color:var(--gold)}

.page{display:none}
.page.active{display:block}

.progress-wrap{width:80px}
.progress-bar{width:100%;height:3px;background:rgba(184,151,90,0.12);margin-top:4px}
.progress-fill{height:100%;transition:width .5s}
.progress-txt{font-size:9px;color:var(--text-subtle);margin-top:2px}

.notify-toast{position:fixed;bottom:32px;right:32px;z-index:999;background:var(--dark-2);border:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:12px;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none;max-width:320px}
.notify-toast.show{opacity:1;transform:translateY(0)}
.toast-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.toast-sym{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--text)}
.toast-msg{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-subtle);margin-top:2px}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-logo">FDN <span>CAPITAL</span></div>
    <div class="hdr-tag">Trading Journal</div>
  </div>
  <div class="hdr-right">
    <div class="live-pill"><div class="live-dot" id="live-dot"></div><span id="live-label">Connecting</span></div>
    <button class="btn-add" onclick="openModal()">+ Log Trade</button>
  </div>
</div>

<div class="price-ticker" id="price-ticker"></div>

<div class="tabs">
  <div class="tab active" onclick="switchPage('dashboard',event)">Dashboard</div>
  <div class="tab" onclick="switchPage('history',event)">Trade History</div>
  <div class="tab" onclick="switchPage('notes',event)">Journal Notes</div>
</div>

<!-- DASHBOARD -->
<div class="page active" id="page-dashboard">
<div class="main">
  <div class="stat-row" id="stat-row"></div>
  <div class="sec-label">Live Positions</div>
  <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th>Symbol</th><th>Direction</th><th>Entry</th><th>Current Price</th><th>SL / TP</th><th>Size</th><th>Open P&L</th><th>Progress</th><th>Status</th><th></th>
      </tr></thead>
      <tbody id="open-tbody"></tbody>
    </table>
  </div>
  <div class="bottom-grid">
    <div class="chart-box">
      <div class="chart-lbl">Equity Curve</div>
      <svg class="equity-chart" id="equity-svg" viewBox="0 0 440 140" fill="none" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <div class="breakdown-box">
      <div class="chart-lbl">P&L by Symbol</div>
      <div id="breakdown-list"></div>
    </div>
  </div>
</div>
</div>

<!-- HISTORY -->
<div class="page" id="page-history">
<div class="main">
  <div class="tbl-wrap">
    <div class="tbl-head">
      <div class="tbl-title">Closed Trades</div>
      <div class="tbl-filter">
        <button class="filter-btn active" onclick="filterHistory('all',this)">All</button>
        <button class="filter-btn" onclick="filterHistory('win',this)">Winners</button>
        <button class="filter-btn" onclick="filterHistory('loss',this)">Losers</button>
      </div>
    </div>
    <table>
      <thead><tr>
        <th>Date</th><th>Symbol</th><th>Direction</th><th>Entry</th><th>Exit</th><th>Size</th><th>P&L</th><th>R Multiple</th><th></th>
      </tr></thead>
      <tbody id="hist-tbody"></tbody>
    </table>
  </div>
</div>
</div>

<!-- NOTES -->
<div class="page" id="page-notes">
<div class="main">
  <div class="sec-label">Journal Notes</div>
  <div class="notes-grid" id="notes-grid"></div>
</div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title" id="modal-title-txt">Log New Trade</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-idx" value="">
      <div class="form-row-2">
        <div class="form-group">
          <label class="form-label">Symbol (Binance format)</label>
          <select class="form-input" id="f-symbol">
            <optgroup label="Gold">
              <option value="XAUTUSDT">XAU/USD (XAUTUSDT)</option>
            </optgroup>
            <optgroup label="Crypto Major">
              <option value="BTCUSDT">BTC/USDT</option>
              <option value="ETHUSDT">ETH/USDT</option>
              <option value="SOLUSDT">SOL/USDT</option>
              <option value="BNBUSDT">BNB/USDT</option>
              <option value="XRPUSDT">XRP/USDT</option>
              <option value="DOGEUSDT">DOGE/USDT</option>
              <option value="ADAUSDT">ADA/USDT</option>
              <option value="AVAXUSDT">AVAX/USDT</option>
            </optgroup>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Direction</label>
          <select class="form-input" id="f-dir">
            <option value="Long">Long</option>
            <option value="Short">Short</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Order Type</label>
        <select class="form-input" id="f-type">
          <option value="market">Market (langsung open)</option>
          <option value="limit">Limit Order (open kalau harga kena entry)</option>
        </select>
      </div>
      <div class="form-row-2">
        <div class="form-group">
          <label class="form-label">Entry Price</label>
          <input class="form-input" id="f-entry" type="number" placeholder="0.00" step="any">
        </div>
        <div class="form-group">
          <label class="form-label">Exit Price (kosong = open)</label>
          <input class="form-input" id="f-exit" type="number" placeholder="0.00" step="any">
        </div>
      </div>
      <div class="form-row-2">
        <div class="form-group">
          <label class="form-label">Stop Loss</label>
          <input class="form-input" id="f-sl" type="number" placeholder="0.00" step="any">
        </div>
        <div class="form-group">
          <label class="form-label">Take Profit</label>
          <input class="form-input" id="f-tp" type="number" placeholder="0.00" step="any">
        </div>
      </div>
      <div class="form-row-2">
        <div class="form-group">
          <label class="form-label">Position Size (lots/units)</label>
          <input class="form-input" id="f-size" type="number" placeholder="1" step="any">
        </div>
        <div class="form-group">
          <label class="form-label">Date</label>
          <input class="form-input" id="f-date" type="date">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Setup / Notes</label>
        <textarea class="form-input" id="f-notes" rows="3" placeholder="Describe your setup, rationale, market conditions..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Strategy Tag</label>
        <input class="form-input" id="f-tag" placeholder="e.g. Breakout, Mean Reversion, Trend Follow">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveTrade()">Save Trade →</button>
    </div>
  </div>
</div>

<!-- TOAST NOTIFICATION -->
<div class="notify-toast" id="toast">
  <div class="toast-dot" id="toast-dot"></div>
  <div>
    <div class="toast-sym" id="toast-sym"></div>
    <div class="toast-msg" id="toast-msg"></div>
  </div>
</div>

<script>
const SYMBOLS_TRACK = ['XAUTUSDT','BTCUSDT','ETHUSDT','SOLUSDT','BNBUSDT','XRPUSDT','DOGEUSDT','ADAUSDT','AVAXUSDT'];
const SYM_DISPLAY = {XAUTUSDT:'XAU/USD',BTCUSDT:'BTC/USDT',ETHUSDT:'ETH/USDT',SOLUSDT:'SOL/USDT',BNBUSDT:'BNB/USDT',XRPUSDT:'XRP/USDT',DOGEUSDT:'DOGE/USDT',ADAUSDT:'ADA/USDT',AVAXUSDT:'AVAX/USDT'};

let livePrices = {};
let prevPrices = {};
let feedConnected = false;
let histFilter = 'all';

let trades = [
  {id:1,symbol:'BTCUSDT',dir:'Long',type:'market',entry:61200,exit:64800,size:0.5,sl:59500,tp:66000,date:'2025-04-01',notes:'Breakout above key resistance. Strong volume confirmation.',tag:'Breakout'},
  {id:2,symbol:'ETHUSDT',dir:'Long',type:'market',entry:3120,exit:3380,size:2,sl:2980,tp:3500,date:'2025-04-03',notes:'EMA crossover on 4H. Good risk-reward.',tag:'Trend Follow'},
  {id:3,symbol:'SOLUSDT',dir:'Short',type:'market',entry:155,exit:141,size:10,sl:162,tp:138,date:'2025-04-07',notes:'Rejection at resistance, bearish divergence.',tag:'Mean Reversion'},
  {id:4,symbol:'BNBUSDT',dir:'Long',type:'market',entry:420,exit:398,size:3,sl:408,tp:450,date:'2025-04-10',notes:'Failed breakout — stopped out.',tag:'Breakout'},
  {id:5,symbol:'XRPUSDT',dir:'Long',type:'market',entry:0.52,exit:null,size:1000,sl:0.48,tp:0.62,date:'2025-04-22',notes:'Accumulation zone. Long-term hold.',tag:'Position'},
  {id:6,symbol:'BTCUSDT',dir:'Long',type:'market',entry:63500,exit:null,size:0.3,sl:61000,tp:70000,date:'2025-04-28',notes:'Retested breakout zone. Adding to core position.',tag:'Trend Follow'},
  {id:7,symbol:'XAUTUSDT',dir:'Long',type:'market',entry:3200,exit:null,size:1,sl:3150,tp:3350,date:'2025-04-30',notes:'Gold breakout above resistance. Bullish structure.',tag:'Trend Follow'},
];
let nextId = 8;

function symDec(sym) {
  if(sym==='XAUTUSDT') return 2;
  const p = livePrices[sym]||0;
  if(p < 0.01) return 6;
  if(p < 1) return 4;
  if(p < 10) return 3;
  if(p < 1000) return 2;
  return 2;
}

function fmt(n, prefix='$') {
  if(n===null||n===undefined||isNaN(n)) return '—';
  const abs = Math.abs(n);
  let s;
  if(abs>=1000) s = prefix+(abs/1000).toFixed(2)+'K';
  else s = prefix+abs.toFixed(2);
  return (n<0?'-':'')+s;
}

function fmtPrice(n, sym) {
  if(n===null||n===undefined||isNaN(n)) return '—';
  return n.toFixed(symDec(sym));
}

function fmtPct(n) {
  if(n===null||isNaN(n)) return '—';
  return (n>0?'+':'')+n.toFixed(2)+'%';
}

function calcPnl(t) {
  if(!t.exit) return null;
  const raw = t.dir==='Long' ? (t.exit-t.entry)*t.size : (t.entry-t.exit)*t.size;
  return +raw.toFixed(2);
}

function calcOpenPnl(t) {
  const cp = livePrices[t.symbol];
  if(!cp) return null;
  return t.dir==='Long' ? (cp-t.entry)*t.size : (t.entry-cp)*t.size;
}

function calcR(t) {
  if(!t.exit||!t.sl) return null;
  const risk = Math.abs(t.entry-t.sl)*t.size;
  const pnl = calcPnl(t);
  if(!risk||pnl===null) return null;
  return +(pnl/risk).toFixed(2);
}

function calcProgress(t) {
  const cp = livePrices[t.symbol];
  if(!cp||!t.sl||!t.tp) return null;
  if(t.dir==='Long') {
    const range = t.tp - t.sl;
    if(range<=0) return null;
    return Math.min(100, Math.max(0, ((cp-t.sl)/range)*100));
  } else {
    const range = t.sl - t.tp;
    if(range<=0) return null;
    return Math.min(100, Math.max(0, ((t.sl-cp)/range)*100));
  }
}

// PRICE FEED
async function fetchPrices() {
  try {
    const symsJSON = JSON.stringify(SYMBOLS_TRACK);
    const url = `https://api.binance.com/api/v3/ticker/24hr?symbols=${encodeURIComponent(symsJSON)}`;
    const r = await fetch(url);
    if(!r.ok) throw new Error('API fail');
    const data = await r.json();
    prevPrices = {...livePrices};
    data.forEach(d => { livePrices[d.symbol] = parseFloat(d.lastPrice); });
    feedConnected = true;
    document.getElementById('live-dot').style.background = '#4A9E6A';
    document.getElementById('live-label').textContent = 'Live';
  } catch(e) {
    feedConnected = false;
    document.getElementById('live-dot').style.background = '#D97070';
    document.getElementById('live-label').textContent = 'Reconnecting';
  }
}

function renderTicker() {
  const items = SYMBOLS_TRACK.map(sym => {
    const p = livePrices[sym];
    const prev = prevPrices[sym]||p;
    if(!p) return '';
    const up = p >= (prev||p);
    const chgPct = prev ? ((p-prev)/prev*100) : 0;
    return `<div class="ticker-item">
      <span class="ticker-sym">${SYM_DISPLAY[sym]||sym}</span>
      <span class="ticker-price" id="tp-${sym}">${fmtPrice(p,sym)}</span>
      <span class="ticker-chg ${up?'pnl-pos':'pnl-neg'}">${up?'▲':'▼'} ${Math.abs(chgPct).toFixed(2)}%</span>
    </div>`;
  }).join('');
  document.getElementById('price-ticker').innerHTML = items;
}

// AUTO CHECK SL/TP/LIMIT
function autoCheckPositions() {
  let changed = false;
  trades.forEach(t => {
    if(t.exit !== null) return;
    const cp = livePrices[t.symbol];
    if(!cp) return;

    // Limit order: check if price reached entry
    if(t.type === 'limit' && !t.activated) {
      const triggered = t.dir==='Long' ? cp <= t.entry : cp >= t.entry;
      if(triggered) {
        t.activated = true;
        showToast(t.symbol, 'Limit order triggered — position open', '#B8975A');
        changed = true;
      } else {
        return; // not active yet
      }
    }

    // Check SL
    if(t.sl) {
      const slHit = t.dir==='Long' ? cp <= t.sl : cp >= t.sl;
      if(slHit) {
        t.exit = t.sl;
        t.closedReason = 'SL';
        t.date_close = new Date().toISOString().slice(0,10);
        showToast(t.symbol, 'Stop Loss hit — position closed', '#D97070');
        changed = true;
      }
    }

    // Check TP
    if(!t.exit && t.tp) {
      const tpHit = t.dir==='Long' ? cp >= t.tp : cp <= t.tp;
      if(tpHit) {
        t.exit = t.tp;
        t.closedReason = 'TP';
        t.date_close = new Date().toISOString().slice(0,10);
        showToast(t.symbol, 'Take Profit hit — position closed', '#6BBF8A');
        changed = true;
      }
    }
  });
  return changed;
}

let toastTimer = null;
function showToast(sym, msg, color) {
  const toast = document.getElementById('toast');
  document.getElementById('toast-dot').style.background = color;
  document.getElementById('toast-sym').textContent = SYM_DISPLAY[sym]||sym;
  document.getElementById('toast-msg').textContent = msg;
  toast.classList.add('show');
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>toast.classList.remove('show'), 4000);
}

// RENDER STATS
function renderStats() {
  const closed = trades.filter(t=>t.exit!==null);
  const open = trades.filter(t=>t.exit===null && (t.type!=='limit'||t.activated));
  const wins = closed.filter(t=>calcPnl(t)>0);
  const losses = closed.filter(t=>calcPnl(t)<=0);
  const totalPnl = closed.reduce((a,t)=>a+calcPnl(t),0);
  const winRate = closed.length ? (wins.length/closed.length*100) : 0;
  const avgR = closed.length ? closed.reduce((a,t)=>{const r=calcR(t);return a+(r||0);},0)/closed.length : 0;
  const openPnl = open.reduce((a,t)=>{const p=calcOpenPnl(t);return a+(p||0);},0);
  const stats = [
    {lbl:'Total P&L',val:fmt(totalPnl),cls:totalPnl>=0?'pos':'neg',sub:closed.length+' closed trades'},
    {lbl:'Win Rate',val:winRate.toFixed(0)+'%',cls:winRate>=50?'pos':'neg',sub:wins.length+'W / '+losses.length+'L'},
    {lbl:'Avg R Multiple',val:(avgR>0?'+':'')+avgR.toFixed(2)+'R',cls:avgR>=1?'pos':'neg',sub:'Risk-adjusted'},
    {lbl:'Open Positions',val:open.length,cls:'',sub:fmt(openPnl)+' unrealized'},
    {lbl:'Total Trades',val:trades.length,cls:'',sub:closed.length+' closed'},
  ];
  document.getElementById('stat-row').innerHTML = stats.map(s=>`
    <div class="stat-card">
      <div class="stat-label">${s.lbl}</div>
      <div class="stat-val ${s.cls}">${s.val}</div>
      <div class="stat-sub">${s.sub}</div>
    </div>`).join('');
}

// RENDER OPEN
function renderOpen() {
  const open = trades.filter(t=>t.exit===null);
  const tbody = document.getElementById('open-tbody');
  if(!open.length) {
    tbody.innerHTML=`<tr><td colspan="10"><div class="empty"><div class="empty-icon">FDN</div>No open positions</div></td></tr>`;
    return;
  }
  tbody.innerHTML = open.map(t => {
    const cp = livePrices[t.symbol];
    const isLimit = t.type==='limit' && !t.activated;
    const pnl = isLimit ? null : calcOpenPnl(t);
    const pnlPct = (pnl!==null && t.entry && t.size) ? (pnl/(t.entry*t.size)*100) : null;
    const prog = (!isLimit) ? calcProgress(t) : null;
    const progColor = prog!==null ? (prog>66?'#6BBF8A':prog>33?'#B8975A':'#D97070') : '#5A5652';
    const statusBadge = isLimit
      ? `<span class="badge limit">Limit Pending</span>`
      : `<span class="badge open">Open</span>`;
    return `<tr>
      <td><span class="td-sym">${SYM_DISPLAY[t.symbol]||t.symbol}</span></td>
      <td><span class="badge ${t.dir.toLowerCase()}">${t.dir}</span></td>
      <td>${fmtPrice(t.entry,t.symbol)}</td>
      <td style="font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--text)">${cp?fmtPrice(cp,t.symbol):'—'}</td>
      <td>
        <span style="color:#D97070">${t.sl?fmtPrice(t.sl,t.symbol):'—'}</span>
        <span style="color:var(--text-subtle);margin:0 4px">/</span>
        <span style="color:#6BBF8A">${t.tp?fmtPrice(t.tp,t.symbol):'—'}</span>
      </td>
      <td>${t.size}</td>
      <td class="${pnl===null?'':pnl>=0?'pnl-pos':'pnl-neg'}">
        ${pnl===null?'<span style="color:var(--text-subtle)">Pending</span>':fmt(pnl)+' <span style="opacity:.6;font-size:10px">('+fmtPct(pnlPct)+')</span>'}
      </td>
      <td>
        ${prog!==null?`<div class="progress-wrap">
          <div class="progress-bar"><div class="progress-fill" style="width:${prog.toFixed(0)}%;background:${progColor}"></div></div>
          <div class="progress-txt">${prog.toFixed(0)}% to TP</div>
        </div>`:isLimit?'<span style="font-size:10px;color:var(--text-subtle)">Waiting entry</span>':'—'}
      </td>
      <td>${statusBadge}</td>
      <td><div class="row-action">
        <button class="act-btn" onclick="editTrade(${t.id})">Edit</button>
        <button class="act-btn del" onclick="deleteTrade(${t.id})">Del</button>
      </div></td>
    </tr>`;
  }).join('');
}

// RENDER HISTORY
function renderHistory() {
  let data = trades.filter(t=>t.exit!==null);
  if(histFilter==='win') data=data.filter(t=>calcPnl(t)>0);
  if(histFilter==='loss') data=data.filter(t=>calcPnl(t)<=0);
  const tbody = document.getElementById('hist-tbody');
  if(!data.length) {
    tbody.innerHTML=`<tr><td colspan="9"><div class="empty"><div class="empty-icon">FDN</div>No trades found</div></td></tr>`;
    return;
  }
  tbody.innerHTML = [...data].reverse().map(t=>{
    const pnl=calcPnl(t), r=calcR(t);
    const reasonBadge = t.closedReason ? `<span class="badge ${t.closedReason==='TP'?'tp-hit':'sl-hit'}" style="margin-left:6px">${t.closedReason}</span>` : '';
    return `<tr>
      <td>${t.date_close||t.date}</td>
      <td><span class="td-sym">${SYM_DISPLAY[t.symbol]||t.symbol}</span></td>
      <td><span class="badge ${t.dir.toLowerCase()}">${t.dir}</span></td>
      <td>${fmtPrice(t.entry,t.symbol)}</td>
      <td>${fmtPrice(t.exit,t.symbol)}${reasonBadge}</td>
      <td>${t.size}</td>
      <td class="${pnl>0?'pnl-pos':'pnl-neg'}">${fmt(pnl)}</td>
      <td class="${r&&r>=1?'pnl-pos':r&&r<0?'pnl-neg':'pnl-neutral'}">${r!==null?(r>0?'+':'')+r+'R':'—'}</td>
      <td><div class="row-action">
        <button class="act-btn" onclick="editTrade(${t.id})">Edit</button>
        <button class="act-btn del" onclick="deleteTrade(${t.id})">Del</button>
      </div></td>
    </tr>`;
  }).join('');
}

function filterHistory(f,btn) {
  histFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderHistory();
}

// EQUITY CURVE
function renderEquity() {
  const closed = trades.filter(t=>t.exit!==null).sort((a,b)=>(a.date_close||a.date).localeCompare(b.date_close||b.date));
  let cum=0;
  const pts=[{v:0}];
  closed.forEach(t=>{cum+=calcPnl(t);pts.push({v:cum,d:t.date_close||t.date});});
  if(pts.length<2){document.getElementById('equity-svg').innerHTML='';return;}
  const vals=pts.map(p=>p.v), mn=Math.min(...vals), mx=Math.max(...vals), range=mx-mn||1;
  const W=440,H=140,pad=20, xS=(W-2*pad)/(pts.length-1), yS=(H-2*pad)/range;
  const points=pts.map((p,i)=>`${pad+i*xS},${H-pad-(p.v-mn)*yS}`).join(' ');
  const last=`${pad+(pts.length-1)*xS},${H-pad-(pts[pts.length-1].v-mn)*yS}`;
  const fillPath=`M${pad},${H-pad-(pts[0].v-mn)*yS} L${points} L${pad+(pts.length-1)*xS},${H-pad} L${pad},${H-pad} Z`;
  document.getElementById('equity-svg').innerHTML=`
    <defs><linearGradient id="eg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B8975A" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#B8975A" stop-opacity="0"/>
    </linearGradient></defs>
    <line x1="${pad}" y1="${pad}" x2="${pad}" y2="${H-pad}" stroke="rgba(184,151,90,0.1)" stroke-width="1"/>
    <line x1="${pad}" y1="${H-pad}" x2="${W-pad}" y2="${H-pad}" stroke="rgba(184,151,90,0.1)" stroke-width="1"/>
    <path d="${fillPath}" fill="url(#eg)"/>
    <polyline points="${points}" stroke="#B8975A" stroke-width="2" fill="none"/>
    <circle cx="${last.split(',')[0]}" cy="${last.split(',')[1]}" r="4" fill="#B8975A"/>
    <text x="${pad}" y="${H-4}" fill="rgba(184,151,90,0.4)" font-size="9" font-family="DM Sans">${closed[0]?.date||''}</text>
    <text x="${W-pad}" y="${H-4}" fill="rgba(184,151,90,0.4)" font-size="9" text-anchor="end" font-family="DM Sans">${closed[closed.length-1]?.date||''}</text>`;
}

// BREAKDOWN
function renderBreakdown() {
  const syms={};
  trades.filter(t=>t.exit).forEach(t=>{const p=calcPnl(t);syms[t.symbol]=(syms[t.symbol]||0)+p;});
  const arr=Object.entries(syms).sort((a,b)=>b[1]-a[1]);
  if(!arr.length){document.getElementById('breakdown-list').innerHTML='<div class="empty" style="padding:20px">No closed trades yet</div>';return;}
  const maxA=Math.max(...arr.map(a=>Math.abs(a[1])));
  document.getElementById('breakdown-list').innerHTML=arr.map(([sym,pnl])=>`
    <div class="bk-row">
      <span class="bk-sym">${SYM_DISPLAY[sym]||sym}</span>
      <div class="bk-bar-wrap"><div class="bk-bar" style="width:${(Math.abs(pnl)/maxA*100).toFixed(1)}%;background:${pnl>=0?'#4A9E6A':'#C05A5A'}"></div></div>
      <span class="bk-val ${pnl>=0?'pnl-pos':'pnl-neg'}">${fmt(pnl)}</span>
    </div>`).join('');
}

// NOTES
function renderNotes() {
  const notes=trades.filter(t=>t.notes);
  const grid=document.getElementById('notes-grid');
  if(!notes.length){grid.innerHTML=`<div class="empty" style="grid-column:1/-1"><div class="empty-icon">FDN</div>No journal notes yet</div>`;return;}
  grid.innerHTML=[...notes].reverse().map(t=>`
    <div class="note-card">
      <div class="note-sym">${SYM_DISPLAY[t.symbol]||t.symbol}</div>
      <div class="note-date">${t.date} · ${t.dir}</div>
      <div class="note-txt">${t.notes}</div>
      ${t.tag?`<div class="note-tag">✦ ${t.tag}</div>`:''}
    </div>`).join('');
}

// MODAL
function openModal(t=null) {
  document.getElementById('modal-title-txt').textContent=t?'Edit Trade':'Log New Trade';
  document.getElementById('edit-idx').value=t?t.id:'';
  document.getElementById('f-symbol').value=t?t.symbol:'XAUTUSDT';
  document.getElementById('f-dir').value=t?t.dir:'Long';
  document.getElementById('f-type').value=t?t.type:'market';
  document.getElementById('f-entry').value=t?t.entry:'';
  document.getElementById('f-exit').value=t&&t.exit?t.exit:'';
  document.getElementById('f-sl').value=t&&t.sl?t.sl:'';
  document.getElementById('f-tp').value=t&&t.tp?t.tp:'';
  document.getElementById('f-size').value=t?t.size:'';
  document.getElementById('f-date').value=t?t.date:new Date().toISOString().slice(0,10);
  document.getElementById('f-notes').value=t?t.notes:'';
  document.getElementById('f-tag').value=t?t.tag:'';
  document.getElementById('overlay').classList.add('open');
}
function closeModal(){document.getElementById('overlay').classList.remove('open')}
function editTrade(id){openModal(trades.find(t=>t.id===id))}
function deleteTrade(id){if(confirm('Delete this trade?')){trades=trades.filter(t=>t.id!==id);renderAll();}}
function saveTrade() {
  const sym=document.getElementById('f-symbol').value;
  const entry=parseFloat(document.getElementById('f-entry').value);
  if(!sym||!entry){alert('Symbol and Entry are required');return;}
  const exitVal=document.getElementById('f-exit').value;
  const existing=trades.find(t=>t.id===parseInt(document.getElementById('edit-idx').value));
  const obj={
    id:document.getElementById('edit-idx').value?parseInt(document.getElementById('edit-idx').value):nextId++,
    symbol:sym,
    dir:document.getElementById('f-dir').value,
    type:document.getElementById('f-type').value,
    activated: existing?.activated || false,
    entry:entry,
    exit:exitVal?parseFloat(exitVal):null,
    size:parseFloat(document.getElementById('f-size').value)||1,
    sl:parseFloat(document.getElementById('f-sl').value)||null,
    tp:parseFloat(document.getElementById('f-tp').value)||null,
    date:document.getElementById('f-date').value||new Date().toISOString().slice(0,10),
    notes:document.getElementById('f-notes').value.trim(),
    tag:document.getElementById('f-tag').value.trim(),
    closedReason: existing?.closedReason||null,
    date_close: existing?.date_close||null,
  };
  if(document.getElementById('edit-idx').value){trades=trades.map(t=>t.id===obj.id?obj:t);}
  else{trades.push(obj);}
  closeModal();renderAll();
}

function renderAll() {
  renderStats();renderOpen();renderHistory();renderEquity();renderBreakdown();renderNotes();
}

function switchPage(name,event) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  if(event&&event.target) event.target.classList.add('active');
}

document.getElementById('overlay').addEventListener('click',e=>{if(e.target===document.getElementById('overlay'))closeModal();});

// MAIN LOOP
async function tick() {
  await fetchPrices();
  renderTicker();
  const changed = autoCheckPositions();
  if(changed) renderAll();
  else { renderOpen(); renderStats(); }
}

renderAll();
tick();
setInterval(tick, 5000);
</script>
